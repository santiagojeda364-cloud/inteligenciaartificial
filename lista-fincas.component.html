<div class="container">
  <h2>Lista de Fincas</h2>

  <input type="text" [(ngModel)]="filtro" placeholder="Buscar finca...">

  <table>
    <tr>
      <th>Nombre</th>
      <th>Propietario</th>
      <th>Ubicación</th>
    </tr>

    <tr *ngFor="let finca of fincas">
      <td>{{finca.nombre}}</td>
      <td>{{finca.propietario}}</td>
      <td>{{finca.ubicacion}}</td>
    </tr>
  </table>
</div>
